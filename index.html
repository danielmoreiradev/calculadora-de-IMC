<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <section class="container">
            <div>
                <p class="parag-inicial">Calculadora de Saúde</p>
            </div>

            <h1 class="titulo">Calcule seu <span class="destaque">IMC</span></h1>
            <p> Descubra seu indice de Massa Corporal e entenda melhor sua saude</p>

            <div class="formulario">
                <label for="peso">Peso (kg)</label>
                <input type="number" id="peso" placeholder="Ex: 70" >

                <label for="altura">Altura (m)</label>
                <input type="number" id="altura" placeholder="Ex: 1.75">

                <button type="submit" id="btn"> Calcular meu IMC</button>

                <p id="resultado"></p>

    
            </div>
            <div class="txt-rodape">
                    <p>O IMC é uma estimativa. Consulte um profissional de saúde para uma avaliação completa.</p>
                </div>

        </section>


    </main>
    <script src="script.js"></script>
</body>
</html>
